        /* Global reset and dark theme */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background-color: #000;
            color: #fff;
            font-family: 'Orbitron', sans-serif;
            overflow-x: hidden;
        }

        /* ---------- Root Neon Palette ---------- */
        :root{
          --fire:#ff4757;
          --ice:#00d2d3;
          --void:#5f27cd;
          --earth:#2ed573;
          --dark:#01020f;
          --glow1:#00ffff80;
          --glow2:#ff00ff80;
        }

        #software-lab{
          background:radial-gradient(ellipse at center, #0a0e27 0%, var(--dark) 100%);
          padding:100px 20px;
          color:#fff;
          font-family:'Orbitron','Segoe UI',sans-serif;
        }

        /* ---------- Glitch Neon Title ---------- */
        .neural-title{
          position:relative;
          font-size:clamp(2rem, 5vw, 3.5rem);
          font-weight:900;
          text-align:center;
          letter-spacing:4px;
          text-shadow:
            0 0 5px var(--ice),
            0 0 10px var(--ice),
            0 0 20px var(--ice),
            0 0 40px var(--glow1),
            0 0 80px var(--glow1);
        }
        .neural-title::before,
        .neural-title::after{
          content:attr(data-text);
          position:absolute;
          top:0;left:0;
          width:100%;height:100%;
        }
        .neural-title::before{
          left:2px;
          text-shadow:-2px 0 var(--glow1);
          clip:rect(44px, 9999px, 56px, 0);
          animation:glitch 1.2s infinite;
        }
        .neural-title::after{
          left:-2px;
          text-shadow:-2px 0 var(--glow2);
          clip:rect(84px, 9999px, 96px, 0);
          animation:glitch 1.5s infinite reverse;
        }
        @keyframes glitch{
          0%{transform:translate(0)}
          20%{transform:translate(-3px, 3px)}
          40%{transform:translate(-3px, -3px)}
          60%{transform:translate(3px, 3px)}
          80%{transform:translate(3px, -3px)}
          100%{transform:translate(0)}
        }
        .neural-sub{
          text-align:center;
          font-size:1.2rem;
          color:var(--ice);
          text-shadow:0 0 8px var(--ice);
          margin-bottom:2rem;
        }

        /* ---------- Layout ---------- */
        .lab-grid{
          display:grid;
          grid-template-columns:1fr 1fr;
          gap:30px;
          max-width:1200px;
          margin:auto;
        }
        @media(max-width:900px){.lab-grid{grid-template-columns:1fr;}}

        /* ---------- Editor Panel ---------- */
        .editor-panel{
          background:rgba(13,17,23,.7);
          border:1px solid var(--ice);
          border-radius:15px;
          display:flex;
          flex-direction:column;
          overflow:hidden;
          backdrop-filter:blur(6px);
          box-shadow:0 0 20px var(--ice);
        }
        .synapse-tabs{
          display:flex;
          border-bottom:1px solid var(--ice);
        }
        .syn-tab{
          flex:1;
          background:transparent;
          border:none;
          color:var(--ice);
          padding:.7rem;
          font-family:'Orbitron',sans-serif;
          font-weight:500;
          cursor:pointer;
          transition:.3s;
          position:relative;
        }
        .syn-tab.active{
          color:#fff;
          text-shadow:0 0 10px var(--ice);
        }
        .syn-tab::after{
          content:'';
          position:absolute;
          bottom:0;left:50%;
          width:0;height:2px;
          background:var(--ice);
          transition:.3s;
          transform:translateX(-50%);
        }
        .syn-tab.active::after{width:80%;}

        .code-area{flex:1;position:relative;}

          color:#e6edf3;
          border:none;

</head>

    <!-- ================== Neural Canvas Script (no rotation) ================== -->
    <script>
        /* ---------- Resize ---------- */
        const canvas = document.getElementById('neuralCanvas');
        const ctx    = canvas.getContext('2d');
        function resizeCanvas(){
          canvas.width  = canvas.offsetWidth;
          canvas.height = canvas.offsetHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        /* ---------- Nodes & Connections ---------- */
        const nodes = [];
        const conns = [];
        const nodeCount = 50;

        for(let i=0;i<nodeCount;i++){
          nodes.push({
            x:Math.random()*canvas.width,
            y:Math.random()*canvas.height,
            vx:(Math.random()-.5)*.3,
            vy:(Math.random()-.5)*.3,
            r:Math.random()*1.5+1,
            pulse:Math.random()*Math.PI*2
          });
        }
        for(let i=0;i<nodes.length;i++){
          for(let j=i+1;j<nodes.length;j++){
            if(Math.hypot(nodes[i].x-nodes[j].x, nodes[i].y-nodes[j].y) < 130){
              conns.push({a:nodes[i], b:nodes[j]});
            }
          }
        }

        /* ---------- Draw Neural Network ---------- */
        function drawNeural(){
          ctx.clearRect(0,0,canvas.width,canvas.height);
          // Draw connections
          conns.forEach(c=>{
            ctx.beginPath();
            ctx.moveTo(c.a.x, c.a.y);
            ctx.lineTo(c.b.x, c.b.y);
            ctx.strokeStyle = 'rgba(0,255,255,0.18)';
            ctx.lineWidth = 1;
            ctx.stroke();
          });
          // Draw nodes
          nodes.forEach(n=>{
            n.x += n.vx;
            n.y += n.vy;
            n.pulse += 0.02;
            if(n.x < 0 || n.x > canvas.width) n.vx *= -1;
            if(n.y < 0 || n.y > canvas.height) n.vy *= -1;
            ctx.beginPath();
            ctx.arc(n.x, n.y, n.r + Math.sin(n.pulse)*.5, 0, Math.PI*2);
            ctx.fillStyle = 'rgba(0,255,255,0.85)';
            ctx.shadowBlur = 12;
            ctx.shadowColor = '#00ffff';
            ctx.fill();
            ctx.shadowBlur = 0;
          });
          requestAnimationFrame(drawNeural);
        }
        drawNeural();
    </script>

                js: `class Calculator {
    constructor() {
        this.display = document.getElementById('result');
        this.currentInput = '0';
        this.previousInput = '';
        this.operation = null;
        this.resetScreen = false;
        this.initialize();
    }
    
    initialize() {
        const buttons = document.querySelectorAll('.btn');
        buttons.forEach(button => {
            button.addEventListener('click', () => {
                this.handleButtonClick(button.textContent);
            });
        });
        
        this.updateDisplay();
    }
    
    handleButtonClick(value) {
        if (this.isNumber(value)) {
            this.inputNumber(value);
        } else if (this.isOperator(value)) {
            this.inputOperator(value);
        } else if (value === '=') {
            this.calculate();
        } else if (value === 'C') {
            this.clear();
        } else if (value === '.') {
            this.inputDecimal();
        }
        
        this.updateDisplay();
    }
    
    isNumber(value) {
        return !isNaN(value) && value !== ' ';
    }
    
    isOperator(value) {
        return ['+', '-', '*', '/'].includes(value);
    }
    
    inputNumber(num) {
        if (this.currentInput === '0' || this.resetScreen) {
            this.currentInput = num;
            this.resetScreen = false;
        } else {
            this.currentInput += num;
        }
    }
    
    inputOperator(op) {
        if (this.previousInput !== '' && this.operation !== null && !this.resetScreen) {
            this.calculate();
        }
        
        this.operation = op;
        this.previousInput = this.currentInput;
        this.resetScreen = true;
    }
    
    inputDecimal() {
        if (this.resetScreen) {
            this.currentInput = '0.';
            this.resetScreen = false;
            return;
        }
        
        if (!this.currentInput.includes('.')) {
            this.currentInput += '.';
        }
    }
    
    calculate() {
        let computation;
        const prev = parseFloat(this.previousInput);
        const current = parseFloat(this.currentInput);
        
        if (isNaN(prev) || isNaN(current)) return;
        
        switch (this.operation) {
            case '+':
                computation = prev + current;
                break;
            case '-':
                computation = prev - current;
                break;
            case '*':
                computation = prev * current;
                break;
            case '/':
                computation = prev / current;
                break;
            default:
                return;
        }
        
        this.currentInput = computation.toString();
        this.operation = null;
        this.previousInput = '';
        this.resetScreen = true;
    }
    
    clear() {
        this.currentInput = '0';
        this.previousInput = '';
        this.operation = null;
        this.resetScreen = false;
    }
    
    updateDisplay() {
        this.display.value = this.currentInput;
    }
}

// Initialize calculator when DOM is loaded
document.addEventListener('DOMContentLoaded', function() {
    new Calculator();
});`

    constructor() {
        this.score = 0;
        this.timeLeft = 30;
        this.gameActive = false;
        this.timer = null;
        this.targetColor = null;
        
        this.scoreElement = document.getElementById('score');
        this.timerElement = document.getElementById('timer');
        this.gameBoard = document.getElementById('gameBoard');
        this.startBtn = document.getElementById('startBtn');
        
        this.colors = [
            '#ff4757', '#2ed573', '#1e90ff', 
            '#ffa502', '#ff6b81', '#7bed9f',
            '#70a1ff', '#ff6348', '#5352ed'
        ];
        
        this.initialize();
    }
    
    initialize() {
        this.startBtn.addEventListener('click', () => {
            this.startGame();
        });
        
        this.createGameBoard();
    }
    
    createGameBoard() {
        this.gameBoard.innerHTML = '';
        
        this.colors.forEach((color, index) => {
            const colorBox = document.createElement('div');
            colorBox.className = 'color-box';
            colorBox.style.backgroundColor = color;
            colorBox.dataset.color = color;
            colorBox.addEventListener('click', () => {
                this.handleColorClick(colorBox);
            });
            
            this.gameBoard.appendChild(colorBox);
        });
    }
    
    startGame() {
        this.score = 0;
        this.timeLeft = 30;
        this.gameActive = true;
        
        this.scoreElement.textContent = this.score;
        this.timerElement.textContent = this.timeLeft;
        this.startBtn.disabled = true;
        this.startBtn.textContent = 'Game Running...';
        
        this.startTimer();
        this.setTargetColor();
    }
    
    startTimer() {
        this.timer = setInterval(() => {
            this.timeLeft--;
            this.timerElement.textContent = this.timeLeft;
            
            if (this.timeLeft <= 0) {
                this.endGame();
            }
        }, 1000);
    }
    
    setTargetColor() {
        // Remove active class from all boxes
        document.querySelectorAll('.color-box').forEach(box => {
            box.classList.remove('active');
        });
        
        // Select random color as target
        const randomIndex = Math.floor(Math.random() * this.colors.length);
        this.targetColor = this.colors[randomIndex];
        
        // Highlight the target color
        const targetBox = document.querySelector(\`[data-color="\${this.targetColor}"]\`);
        if (targetBox) {
            targetBox.classList.add('active');
        }
    }
    
    handleColorClick(colorBox) {
        if (!this.gameActive) return;
        
        const clickedColor = colorBox.dataset.color;
        
        if (clickedColor === this.targetColor) {
            // Correct color clicked
            this.score += 10;
            this.scoreElement.textContent = this.score;
            
            // Visual feedback
            colorBox.style.opacity = '0.7';
            setTimeout(() => {
                colorBox.style.opacity = '1';
            }, 200);
            
            // Set new target color
            this.setTargetColor();
        } else {
            // Wrong color clicked
            this.score = Math.max(0, this.score - 5);
            this.scoreElement.textContent = this.score;
            
            // Visual feedback
            colorBox.style.transform = 'scale(0.9)';
            setTimeout(() => {
                colorBox.style.transform = 'scale(1)';
            }, 200);
        }
    }
    
    endGame() {
        this.gameActive = false;
        clearInterval(this.timer);
        
        this.startBtn.disabled = false;
        this.startBtn.textContent = 'Play Again';
        
        // Show game over message
        const gameOver = document.createElement('div');
        gameOver.className = 'game-over';
        gameOver.textContent = \`Game Over! Final Score: \${this.score}\`;
        
        // Remove existing game over message if any
        const existingMessage = document.querySelector('.game-over');
        if (existingMessage) {
            existingMessage.remove();
        }
        
        this.gameBoard.parentNode.insertBefore(gameOver, this.gameBoard.nextSibling);
        
        // Reset board
        document.querySelectorAll('.color-box').forEach(box => {
            box.classList.remove('active');
        });
    }
}

// Initialize game when DOM is loaded

    new ColorClickerGame();
